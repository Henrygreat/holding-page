<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Stream</title>

  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      background: #f8f9fa;
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      padding: 20px 0 24px;
    }

    .logo {
      height: 56px;
      width: auto;
      max-width: 140px;
      object-fit: contain;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .video-card {
      width: 100%;
      max-width: 760px;
      margin: 20px auto 0;
      border-radius: 28px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
    }

    video,
    .plyr,
    .plyr__video-wrapper {
      width: 100% !important;
      height: 100% !important;
    }

    video {
      display: block;
      object-fit: cover;
    }

    .plyr {
      border-radius: 28px;
      overflow: hidden;
    }

    @media (max-width: 768px) {
      .header {
        padding: 16px 0 18px;
      }

      .logo {
        height: 40px;
        max-width: 120px;
      }

      .container {
        max-width: 100%;
        padding: 0 10px;
      }

      .video-card {
        max-width: 100%;
        margin-top: 10px;
        border-radius: 16px;
      }

      .plyr {
        border-radius: 16px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 0 6px;
      }

      .video-card,
      .plyr {
        border-radius: 12px;
      }

      .logo {
        height: 36px;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <img
      src="https://lweurope.org/loveworld_europe_icon.svg"
      alt="Loveworld UK"
      class="logo"
    />
  </header>

  <main class="container">
    <section class="video-card">
      <div class="video-wrapper">

        <video
          id="player"
          muted
          autoplay
          playsinline
          webkit-playsinline
          controls
        ></video>

      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

  <script>
    (function () {

      const source =
        'https://cdn3.wowza.com/5/L1Uzd2FrbVlLRG1W/live/smil:lwukweb.smil/playlist.m3u8';

      const video = document.getElementById('player');

      video.muted = true;
      video.defaultMuted = true;
      video.autoplay = true;
      video.playsInline = true;

      const player = new Plyr(video, {
        autoplay: true,
        muted: true,
        controls: [
          'play',
          'progress',
          'mute',
          'volume',
          'fullscreen'
        ]
      });

      function tryPlay() {
        video.muted = true;

        const promise = video.play();

        if (promise !== undefined) {
          promise.catch(function() {
            console.log('Autoplay blocked.');
          });
        }
      }

      if (Hls.isSupported()) {

        const hls = new Hls({
          enableWorker: true
        });

        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          tryPlay();
        });

      } else if (
        video.canPlayType('application/vnd.apple.mpegurl')
      ) {

        video.src = source;

        video.addEventListener(
          'loadedmetadata',
          tryPlay
        );
      }

    })();
  </script>

</body>
</html>
