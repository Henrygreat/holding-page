<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Stream</title>

  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f8f9fa;
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      padding: 20px 0 30px;
    }

    .logo {
      height: 56px;
      width: auto;
      object-fit: contain;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .video-card {
      width: 100%;
      border-radius: 34px;
      max-width: 860px;
      margin: 0 auto;
      margin-top: 40px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    .video-wrapper {
  position: relative;
  width: 100%;
  max-width: 860px;   /* ⬅️ controls overall size */
  margin: 0 auto;     /* center it */
  aspect-ratio: 16 / 9;
  background: #000;
  border-radius: 28px;
  overflow: hidden;
}

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .plyr {
      width: 100%;
      height: 100%;
      border-radius: 34px;
      overflow: hidden;
    }

    .plyr__video-wrapper {
      height: 100%;
    }

    .live-badge {
      position: absolute;
      top: 28px;
      left: 28px;
      z-index: 5;
      background: #001e8a;
      color: white;
      font-size: 32px;
      font-weight: 800;
      padding: 4px 12px;
      line-height: 1;
      border-radius: 2px;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      .header {
        padding: 18px 0 24px;
      }

      .logo {
        height: 44px;
      }

      .container {
        padding: 0 12px;
      }

      .video-card,
      .plyr {
        border-radius: 18px;
      }
    
    }
  </style>
</head>

<body>
  <header class="header">
    <img
      src="https://lweurope.org/loveworld_europe_icon.svg"
      alt="Loveworld UK"
      class="logo"
    />
  </header>

  <main class="container">
    <section class="video-card">
      <div class="video-wrapper">
                <video
          id="player"
          autoplay
          muted
          playsinline
          webkit-playsinline
          controls
        ></video>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

  <script>
    (function () {
      const video = document.getElementById('player');
      const source = 'https://cdn3.wowza.com/5/L1Uzd2FrbVlLRG1W/live/smil:lwukweb.smil/playlist.m3u8';

      video.muted = true;
      video.defaultMuted = true;
      video.autoplay = true;
      video.playsInline = true;

      video.setAttribute('muted', '');
      video.setAttribute('autoplay', '');
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');

      const player = new Plyr(video, {
        controls: ['play', 'progress', 'mute', 'volume', 'fullscreen'],
        autoplay: true,
        muted: true
      });

      function tryPlay() {
        video.muted = true;
        video.play().catch(() => {
          console.log('Autoplay blocked; user interaction required.');
        });
      }

      if (Hls.isSupported()) {
        const hls = new Hls({
          enableWorker: true,
          lowLatencyMode: false
        });

        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, tryPlay);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = source;
        video.addEventListener('loadedmetadata', tryPlay);
      }
    })();
  </script>
</body>
</html>
